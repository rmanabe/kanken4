<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>漢検４級 練習アプリ</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="漢検４級">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1a56db">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f8fafc}
#app{max-width:460px;margin:0 auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));padding-top:calc(14px + env(safe-area-inset-top));color:#1a1a1a;min-height:100vh}
@media(prefers-color-scheme:dark){body{background:#0a0a0a}#app{color:#f0f0f0;background:#111}}
.screen{display:none}.screen.active{display:block}
.hdr{text-align:center;padding:14px 0 10px}
.hdr h1{font-size:26px;font-weight:700;letter-spacing:.08em}
.hdr p{font-size:14px;color:#888;margin-top:2px}
.badge{display:inline-block;background:#e8f0fe;color:#1a56db;font-size:13px;padding:2px 10px;border-radius:20px;margin-top:4px;font-weight:600}
.slabel{font-size:13px;color:#888;margin:12px 0 5px;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sbox{background:#dbeafe;border-radius:10px;padding:10px 6px;text-align:center}
@media(prefers-color-scheme:dark){.sbox{background:#1e3a5f}}
.snum{font-size:22px;font-weight:700}
.slbl2{font-size:12px;color:#888;margin-top:2px}
.sec{font-size:13px;color:#888;font-weight:500;margin:10px 0 7px}
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{flex:1;padding:9px 0;border:2px solid #d1d5db;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:#f9fafb;color:#6b7280;text-align:center;transition:all .15s}
@media(prefers-color-scheme:dark){.tab{background:#222;border-color:#444;color:#aaa}}
.tab.on{background:#1a56db;color:#fff;border-color:#1a56db}
.cards{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .15s}
@media(prefers-color-scheme:dark){.card{background:#1e1e1e;border-color:#333}}
.card:hover{border-color:#1a56db}
.card.done{border-color:#16a34a}
.cinfo{flex:1;min-width:0}
.cname{font-size:15px;font-weight:600}
.crow{display:flex;align-items:center;gap:6px;margin-top:4px}
.ctxt{font-size:12px;color:#888;white-space:nowrap}
.pbg{height:4px;flex:1;background:#e5e7eb;border-radius:2px;overflow:hidden}
@media(prefers-color-scheme:dark){.pbg{background:#333}}
.pfill{height:100%;border-radius:2px;transition:width .3s}
.cbadge{font-size:12px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.cb-done{background:#dcfce7;color:#15803d}
.cb-new{background:#dbeafe;color:#1d4ed8}
.cb-wip{background:#fef3c7;color:#92400e}
.clr{background:none;border:1px solid #d1d5db;border-radius:7px;padding:2px 8px;font-size:12px;color:#888;cursor:pointer;flex-shrink:0}
.clr:hover{border-color:#dc2626;color:#dc2626}
.btn-p{width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:7px}
.btn-d{width:100%;padding:10px;background:transparent;color:#dc2626;border:1.5px solid #dc2626;border-radius:12px;font-size:15px;cursor:pointer;margin-top:7px}
.qhdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back{background:none;border:none;font-size:20px;cursor:pointer;color:#888;padding:2px 6px}
.qprog{flex:1}
.plbl{font-size:12px;color:#888;margin-bottom:3px}
.pbar{height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden}
@media(prefers-color-scheme:dark){.pbar{background:#333}}
.pfill2{height:100%;background:#1a56db;border-radius:2px;transition:width .3s}
.pcnt{font-size:13px;color:#888;white-space:nowrap}
.qcard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px 16px;margin-bottom:12px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
@media(prefers-color-scheme:dark){.qcard{background:#1e1e1e;border-color:#333}}
.qbdg{font-size:12px;color:#888;border:1px solid #e5e7eb;padding:2px 9px;border-radius:20px;margin-bottom:10px;display:inline-block}
@media(prefers-color-scheme:dark){.qbdg{border-color:#444}}
.qtxt{font-size:18px;line-height:1.9}
.qtxt u{text-underline-offset:4px}
.qhint{font-size:14px;color:#888;margin-top:8px;line-height:1.8;white-space:pre-line;text-align:left;width:100%}
.opts{display:grid;gap:7px;margin-bottom:10px}
.opts.g2{grid-template-columns:1fr 1fr}
.opts.g1{grid-template-columns:1fr}
.opt{background:#fff;border:1.5px solid #d1d5db;border-radius:10px;padding:11px 10px;font-size:15px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;line-height:1.4}
@media(prefers-color-scheme:dark){.opt{background:#1e1e1e;border-color:#444;color:#f0f0f0}}
.opt:hover{border-color:#1a56db;color:#1a56db}
.opt.ok{background:#dcfce7;border-color:#16a34a;color:#15803d}
.opt.ng{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.opt:disabled{cursor:default}
.fb{display:none;padding:10px 13px;border-radius:10px;font-size:15px;margin-bottom:10px;align-items:flex-start;gap:8px}
.fb.show{display:flex}
.fb.ok2{background:#dcfce7;color:#15803d}
.fb.ng2{background:#fee2e2;color:#991b1b}
.fbody{flex:1;line-height:1.5}
.nxt{width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;display:none}
.nxt.show{display:block}
.rcard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px 16px;text-align:center;margin:12px 0}
@media(prefers-color-scheme:dark){.rcard{background:#1e1e1e;border-color:#333}}
.rscore{font-size:52px;font-weight:700;line-height:1}
.rden{font-size:16px;color:#888}
.rpct{font-size:16px;color:#1a56db;margin-top:5px;font-weight:600}
.rmsg{font-size:15px;color:#888;margin-top:8px}
.rgr{font-size:12px;padding:3px 12px;border-radius:20px;display:inline-block;margin-top:8px;font-weight:600}
.gp{background:#dcfce7;color:#15803d}.gf{background:#fee2e2;color:#991b1b}
.revlist{margin:10px 0;max-height:260px;overflow-y:auto}
.ritem{border-bottom:1px solid #f0f0f0;padding:8px 0;display:flex;gap:8px;font-size:14px}
@media(prefers-color-scheme:dark){.ritem{border-color:#333}}
.rdot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dok{background:#16a34a}.dng{background:#dc2626}
.rq{color:#1a1a1a;line-height:1.4}
@media(prefers-color-scheme:dark){.rq{color:#f0f0f0}}
.ra{color:#888;font-size:13px;margin-top:1px}
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.mover.show{display:flex}
.mbox{background:#fff;border-radius:14px;padding:24px 20px;max-width:300px;width:100%;text-align:center}
@media(prefers-color-scheme:dark){.mbox{background:#222}}
.mtitle{font-size:15px;font-weight:600;margin-bottom:8px}
.mmsg{font-size:13px;color:#888;line-height:1.6;margin-bottom:18px}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcan{padding:10px;background:transparent;border:1.5px solid #d1d5db;border-radius:10px;font-size:13px;cursor:pointer;color:#888}
.mok{padding:10px;background:#dc2626;border:none;border-radius:10px;font-size:13px;cursor:pointer;color:#fff;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div id="pg-home" class="screen active">
    <div class="hdr"><h1>漢検４級</h1><p>漢字検定 練習アプリ</p><span class="badge">試験1〜4　全科目</span></div>
    <div class="slabel" id="slabel">試験1</div>
    <div class="stats">
      <div class="sbox"><div class="snum" id="st0">-</div><div class="slbl2">総問題数</div></div>
      <div class="sbox"><div class="snum" id="st1">-</div><div class="slbl2">解答済み</div></div>
      <div class="sbox"><div class="snum" id="st2">-</div><div class="slbl2">正解済み</div></div>
    </div>
    <div class="sec">試験を選ぶ</div>
    <div class="tabs" id="tabs"></div>
    <div class="cards" id="cards"></div>
    <button class="btn-p" id="btn-practice">この試験を練習</button>
    <button class="btn-d" id="btn-clrall">全データ クリア</button>
  </div>
  <div id="pg-quiz" class="screen">
    <div class="qhdr">
      <button class="back" id="btn-back">←</button>
      <div class="qprog"><div class="plbl" id="qlbl"></div><div class="pbar"><div class="pfill2" id="pbar2" style="width:0%"></div></div></div>
      <div class="pcnt" id="pcnt"></div>
    </div>
    <div class="qcard">
      <span class="qbdg" id="qbdg"></span>
      <div class="qtxt" id="qtxt"></div>
      <div class="qhint" id="qhint"></div>
    </div>
    <div class="opts g2" id="opts"></div>
    <div class="fb" id="fb"><span id="fbi" style="font-size:14px;flex-shrink:0;margin-top:1px"></span><div class="fbody" id="fbody"></div></div>
    <button class="nxt" id="btn-nxt">次の問題 →</button>
  </div>
  <div id="pg-result" class="screen">
    <div style="padding:10px 0 4px;font-size:11px;color:#888">結果</div>
    <div class="rcard"><div><span class="rscore" id="rs"></span><span class="rden" id="rd"></span></div><div class="rpct" id="rp"></div><div class="rmsg" id="rm"></div><div class="rgr" id="rg"></div></div>
    <div class="sec">問題の確認</div>
    <div class="revlist" id="revlist"></div>
    <button class="btn-p" id="btn-rhome">ホームに戻る</button>
  </div>
  <div class="mover" id="modal">
    <div class="mbox"><div class="mtitle" id="mt"></div><div class="mmsg" id="mm"></div>
      <div class="mbtns"><button class="mcan" id="mcan">キャンセル</button><button class="mok" id="mok">クリア</button></div>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
