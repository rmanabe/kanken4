<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<button onclick="dl(192)">Download icon-192.png</button>
<button onclick="dl(512)">Download icon-512.png</button>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.12;
  ctx.fillStyle = '#1a56db';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${size * 0.42}px -apple-system, "Hiragino Sans", sans-serif`;
  ctx.fillText('漢', size / 2, size * 0.38);
  ctx.font = `bold ${size * 0.22}px -apple-system, "Hiragino Sans", sans-serif`;
  ctx.fillText('検４級', size / 2, size * 0.74);
}
draw('c192', 192);
draw('c512', 512);

function dl(size) {
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = document.getElementById(`c${size}`).toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
